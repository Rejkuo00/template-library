<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Templates</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f5f7;
            padding: 2rem 1rem;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: #0066cc;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { text-decoration: underline; }
        .header { margin-bottom: 2rem; }
        .header h1 { font-size: 1.8rem; font-weight: 600; color: #1d1d1f; }
        .header p { color: #86868b; margin-top: 0.3rem; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            text-decoration: none;
            color: #1d1d1f;
            display: block;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            text-align: center;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }
        .card-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
        .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; }
        .card-desc { font-size: 0.75rem; color: #86868b; }
        .footer { text-align: center; margin-top: 2rem; color: #86868b; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../" class="back-link">← Kembali ke Semua Kategori</a>
        
        <div class="header">
            <h1>🎨 Portofolio Templates</h1>
            <p>Pilih versi template portofolio yang Anda inginkan</p>
        </div>

        <div class="grid" id="grid"></div>
        <div class="footer">Klik versi untuk melihat demo template</div>
    </div>

    <script>
        // DAFTAR VERSI PORTOFOLIO - MUDAH DITAMBAH
        const versions = [
            { name: "Portofolio v1", folder: "v1", icon: "🎨", desc: "Minimalis & elegan, cocok untuk creative" },
            { name: "Portofolio v2", folder: "v2", icon: "✨", desc: "Kreatif dengan animasi modern" },
            { name: "Portofolio v3", folder: "v3", icon: "💼", desc: "Profesional untuk corporate" }
        ];

        const grid = document.getElementById('grid');
        const baseUrl = window.location.href;

        grid.innerHTML = versions.map(v => `
            <a href="${baseUrl}${v.folder}/" class="card">
                <div class="card-icon">${v.icon}</div>
                <div class="card-title">${v.name}</div>
                <div class="card-desc">${v.desc}</div>
            </a>
        `).join('');
    </script>
</body>
</html>
