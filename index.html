<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Library</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f5f7;
            padding: 2rem 1rem;
            min-height: 100vh;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 2.5rem; }
        .header h1 { font-size: 2rem; font-weight: 600; color: #1d1d1f; }
        .header p { color: #86868b; margin-top: 0.3rem; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            text-decoration: none;
            color: #1d1d1f;
            display: block;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            text-align: center;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }
        .card-icon { font-size: 3rem; margin-bottom: 1rem; }
        .card-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.3rem; }
        .card-desc { font-size: 0.8rem; color: #86868b; }
        .card-count {
            display: inline-block;
            background: #e8e8ed;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-top: 0.8rem;
        }
        .footer { text-align: center; margin-top: 2.5rem; color: #86868b; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 Template Library</h1>
            <p>Koleksi template website siap pakai</p>
        </div>

        <div class="grid" id="grid"></div>
        <div class="footer">© Template Library | Pilih kategori untuk melihat versi</div>
    </div>

    <script>
        // DAFTAR KATEGORI - MUDAH DITAMBAH
        const categories = [
            { name: "Portofolio", folder: "portofolio", icon: "🎨", desc: "Template portofolio profesional", count: 3 },
            { name: "Landing Page", folder: "landing-page", icon: "🚀", desc: "Landing page untuk marketing", count: 2 },
            { name: "Company Profile", folder: "company-profile", icon: "🏢", desc: "Profil perusahaan & bisnis", count: 2 },
            { name: "Toko Online", folder: "toko-online", icon: "🛒", desc: "E-commerce & toko digital", count: 2 },
            { name: "Blog", folder: "blog", icon: "📝", desc: "Template blog personal", count: 2 },
            { name: "Sistem Informasi", folder: "sistem-informasi", icon: "📊", desc: "Dashboard & sistem data", count: 2 }
        ];

        const grid = document.getElementById('grid');
        const baseUrl = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '');

        grid.innerHTML = categories.map(cat => `
            <a href="${baseUrl}${baseUrl.endsWith('/') ? '' : '/'}${cat.folder}/" class="card">
                <div class="card-icon">${cat.icon}</div>
                <div class="card-title">${cat.name}</div>
                <div class="card-desc">${cat.desc}</div>
                <span class="card-count">📁 ${cat.count} versi</span>
            </a>
        `).join('');
    </script>
</body>
</html>
